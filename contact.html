<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contact Nathaniel Nixon. Send a message or find contact information."
    />
    <link rel="stylesheet" href="style/style.css" />
    <title>Contact Form</title>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header>
      <img
        src="images/Header_Image.jpg"
        alt="Comfy couch in a living room"
        class="header-img"
      />
      <!-- Free image from the National Gallery of Art -->
      <nav aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </header>
    <hr />
    <main id="main-content">
      <section id="hero">
        <div class="container">
          <span>Contact Nathaniel Nixon</span>
          <button>
            <a class="button" href="index.html">Go Back to Home Page</a>
          </button>
        </div>
      </section>
      <h1 class="section-title">Contact Form</h1>
      <form aria-label="Contact form" method="post" action="#">
        <label for="first">First Name</label>
        <input
          id="first"
          type="text"
          name="First"
          placeholder="First Name"
          autocomplete="off"
          required
        />
        <label for="last">Last Name</label>
        <input
          id="last"
          type="text"
          name="Last"
          placeholder="Last Name"
          autocomplete="off"
          required
        />
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          name="Email"
          placeholder="Email Address"
          autocomplete="off"
          required
        />
        <label for="message">Message</label>
        <textarea
          id="message"
          rows="5"
          cols="60"
          name="Message"
          placeholder="Enter Message Here"
          autocomplete="off"
          required
        ></textarea>
        <button type="submit">Submit</button>
      </form>
      <h2
        class="section-title"
        style="
          text-decoration: underline;
          text-decoration-thickness: 5px;
          text-underline-offset: 10px;
        "
      >
        Need to reach out? Here is Nathaniel Nixon's Contact Information:
      </h2>
      <h3 class="section-subtitle">
        Email: example@example.com<br />Phone: 123-456-7890<br />Address: 123
        Example Street, Example City, Example State 12345
      </h3>
    </main>
  </body>
</html>
