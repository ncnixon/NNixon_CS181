<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/style.css" />
    <title>Contact Form</title>
  </head>
  <body>
    <a href="#main-content" class="skip-link" aria-current="page"
      >Skip to main content</a
    >
    <header>
      <!-- Header Image location-->
      <img src="images/Header_Image.jpg" alt="comfy couch" class="header-img" />
      <!-- this is a free downloaded image from the National Gallery of Art  -->
      <nav aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>
    <hr />
    <section id="hero">
      <div
        class="container"
        style="display: flex; flex-direction: column; align-items: center"
      >
        <span>Contact Nathaniel Nixon</span>
        <button style="margin-top: 16px">
          <a
            class="button"
            href="index.html"
            style="text-decoration: none; color: inherit"
            >Go Back to Home Page</a
          >
        </button>
      </div>
    </section>
    <h1
      style="
        font-size: large;
        text-align: center;
        font-weight: bold;
        color: black;
      "
    >
      Contact Form
    </h1>
    <input
      style="text-align: center; width: auto-fill; margin-left: 12%"
      label="First Name"
      type="text"
      name="First"
      placeholder="First Name"
      autocomplete="off"
      required
    />
    <input
      style="text-align: center; width: auto-fill; margin-left: 12%"
      label="Last Name"
      type="text"
      name="Last"
      placeholder="Last Name"
      autocomplete="off"
      required
    />
    <input
      style="text-align: center; width: auto-fill; margin-left: 12%"
      label="Email Address"
      type="email"
      name="Email"
      placeholder="Email Address"
      autocomplete="off"
      required
    />
    <textarea
      style="text-align: center; width: 75%; margin-left: 12%"
      label="Message"
      rows="5"
      cols="60"
      name="Message"
      placeholder="Enter Message Here"
      autocomplete="off"
      required
    ></textarea>
    <button
      style="text-align: center; width: 10%; margin-left: 45%"
      label="Submit"
      type="submit"
    >
      Submit
    </button>
    <main id="main-content">
      <h2
        style="
          font-size: large;
          text-align: center;
          font-weight: bold;
          color: black;
          text-decoration: underline;
          text-decoration-color: black;
          text-decoration-thickness: 5px;
          text-underline-offset: 10px;
        "
      >
        Need to reach out? Here is Nathaniel Nixon's Contact Information:
      </h2>
    </main>
    <h3
      style="
        font-size: medium;
        text-align: center;
        font-weight: bold;
        color: black;
      "
    >
      Email: example@example.com Phone: 123-456-7890 Address: 123 Example
      Street, Example City, Example State 12345
    </h3>
  </body>
</html>
